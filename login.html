<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — LPSOS</title>
<!-- ✅ FIX 4: CSP header added -->
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://qwcngezsbtlorkvgyeqz.supabase.co https://api.ipify.org; img-src 'self' https://raw.githubusercontent.com https://github.com data:;"/>
<link rel="icon" href="https://raw.githubusercontent.com/190031124ravi/images/main/lpsos.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2faf6;--ink:#0f2219;--ink2:#2d5043;
  --muted:#7a9e8e;--faint:#c0d8ce;--border:#d5ebe0;
  --primary:#0f9b6e;--primary2:#0a7a56;--primary3:#e4f5ed;
  --pg:rgba(15,155,110,.12);--teal:#0d8fa0;
  --error:#dc2626;--nav-h:68px;
}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
.bg-fixed{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;background:linear-gradient(150deg,#f2faf6 0%,#e8f5ee 40%,#edfaf4 70%,#e4f7ed 100%);}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.38;animation:blobF 10s ease-in-out infinite;}
.b1{width:560px;height:560px;background:radial-gradient(#a7f3d0,#6ee7b7);top:-180px;right:-140px;}
.b2{width:420px;height:420px;background:radial-gradient(#99f6e4,#5eead4);bottom:-110px;left:-100px;animation-delay:-4s;}
.b3{width:280px;height:280px;background:radial-gradient(#d1fae5,#a7f3d0);top:50%;left:35%;animation-delay:-7s;}
@keyframes blobF{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(18px,-18px) scale(1.05);}66%{transform:translate(-14px,14px) scale(.96);}}
.bg-dots{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(15,155,110,.055) 1px,transparent 1px);background-size:32px 32px;}
/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:200;background:rgba(255,255,255,.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);box-shadow:0 2px 16px rgba(15,155,110,.07);}
.nav-inner{max-width:1100px;margin:0 auto;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 28px;}
.nav-brand{display:flex;align-items:center;gap:11px;text-decoration:none;flex-shrink:0;}
.nav-logo{width:42px;height:42px;border-radius:10px;border:2px solid var(--primary);overflow:hidden;background:var(--primary3);display:flex;align-items:center;justify-content:center;}
.nav-logo img{width:100%;height:100%;object-fit:contain;border-radius:8px;padding:2px;}
.nav-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);line-height:1.2;}
.nav-sub{font-size:10.5px;color:var(--muted);font-weight:500;letter-spacing:.07em;text-transform:uppercase;}
.nav-home-icon{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;background:var(--primary);color:#fff;border-radius:10px;border:none;text-decoration:none;transition:background .2s,transform .15s,box-shadow .2s;box-shadow:0 4px 14px rgba(15,155,110,.25);}
.nav-home-icon svg{width:18px;height:18px;}
.nav-home-icon:hover{background:var(--primary2);transform:translateY(-1px);}
/* PAGE */
.page{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(var(--nav-h) + 48px) 24px 72px;}
.pg-head{text-align:center;margin-bottom:32px;animation:phIn .6s cubic-bezier(.22,1,.36,1) both;max-width:440px;}
@keyframes phIn{from{opacity:0;transform:translateY(-22px)}to{opacity:1;transform:translateY(0)}}
.pg-head h1{font-family:'Playfair Display',serif;font-size:clamp(24px,5vw,36px);font-weight:700;color:var(--ink);line-height:1.15;margin-bottom:8px;}
.pg-head h1 em{font-style:italic;color:var(--primary);}
.pg-head p{font-size:14.5px;color:var(--muted);line-height:1.7;}
/* CARD */
.card{background:rgba(255,255,255,.97);border-radius:22px;padding:36px 38px 32px;box-shadow:0 8px 44px rgba(15,155,110,.12),0 2px 8px rgba(0,0,0,.04),0 0 0 1px rgba(15,155,110,.06);position:relative;overflow:hidden;animation:cardIn .65s .1s cubic-bezier(.22,1,.36,1) both;width:100%;max-width:420px;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--teal));}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
/* FIELDS */
.field{margin-bottom:18px;}
.field label{display:block;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink2);font-weight:700;margin-bottom:7px;}
.iw{position:relative;}
.iw svg.ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--faint);pointer-events:none;transition:color .25s;}
.iw input{width:100%;padding:12px 42px 12px 41px;border:1.5px solid var(--border);border-radius:12px;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .25s,box-shadow .25s,background .2s;-webkit-appearance:none;}
.iw input::placeholder{color:var(--faint);}
.iw input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px var(--pg);}
.iw input.inv{border-color:var(--error);background:#fef2f2;}
.eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;padding:4px;transition:color .2s;}
.eye:hover{color:var(--ink);}
.ferr{font-size:11.5px;color:var(--error);margin-top:4px;min-height:16px;}
/* GLOBAL ERROR */
.g-err{background:#fef2f2;border:1px solid rgba(220,38,38,.2);border-radius:11px;padding:11px 14px;margin-bottom:18px;font-size:13px;color:var(--error);display:none;align-items:center;gap:8px;}
.g-err.show{display:flex;}
.g-err svg{width:16px;height:16px;flex-shrink:0;}
/* ✅ FIX 2: Lockout warning banner */
.lockout-bar{background:rgba(180,83,9,.08);border:1px solid rgba(180,83,9,.2);border-radius:11px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#854F0B;display:none;align-items:center;gap:8px;line-height:1.5;}
.lockout-bar.show{display:flex;}
.lockout-bar svg{width:15px;height:15px;flex-shrink:0;}
/* ATTEMPTS INDICATOR */
.attempts-row{display:flex;gap:5px;margin-bottom:16px;display:none;}
.attempts-row.show{display:flex;}
.atdot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .3s;}
.atdot.used{background:var(--error);}
/* BUTTON */
.btn-p{width:100%;padding:13px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:none;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;position:relative;overflow:hidden;transition:transform .18s,box-shadow .2s;box-shadow:0 4px 20px rgba(15,155,110,.28);display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-p:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(15,155,110,.36);}
.btn-p:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.bt{display:block;transition:opacity .2s;}
.bl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.btn-p.ld .bt{opacity:0;}
.btn-p.ld .bl{opacity:1;}
.lspin{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}
.forgot-row{text-align:right;margin-top:-8px;margin-bottom:18px;}
.forgot-link{font-size:13px;color:var(--primary);font-weight:600;text-decoration:none;}
.forgot-link:hover{color:var(--primary2);text-decoration:underline;}
.link-row{text-align:center;margin-top:18px;font-size:13.5px;color:var(--muted);}
.link-row a{color:var(--primary2);font-weight:600;text-decoration:none;}
.link-row a:hover{text-decoration:underline;}
@media(max-width:600px){
  .nav-inner{padding:0 16px;}
  .nav-sub{display:none;}
  .page{padding:calc(var(--nav-h) + 32px) 16px 60px;}
  .card{padding:26px 18px 22px;border-radius:18px;}
}
</style>
</head>
<body>

<div class="bg-fixed">
  <div class="bg-blob b1"></div><div class="bg-blob b2"></div><div class="bg-blob b3"></div>
  <div class="bg-dots"></div>
</div>

<nav class="navbar"><div class="nav-inner">
  <a class="nav-brand" href="index.html">
    <div class="nav-logo" id="nLW"><img src="https://github.com/190031124ravi/images/blob/main/lpsosimage12.jpg?raw=true" alt="LPS" id="nLI"/></div>
    <div><div class="nav-name">LPS Omniscient Solutions</div><div class="nav-sub">Excellence in Proctoring</div></div>
  </a>
  <a class="nav-home-icon" href="index.html" title="Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </a>
</div></nav>

<div class="page">
  <div class="pg-head">
    <h1>Welcome <em>Back</em></h1>
    <p>Sign in to access your proctor account.</p>
  </div>

  <div class="card">

    <!-- ✅ FIX 2: Lockout warning bar -->
    <div class="lockout-bar" id="lockoutBar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="lockoutTxt">Too many failed attempts. Please wait <strong id="countdown">30</strong>s before trying again.</span>
    </div>

    <!-- Global error -->
    <div class="g-err" id="gErr">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="gErrTxt"></span>
    </div>

    <!-- ✅ FIX 2: Attempt dots — appear after first failure -->
    <div class="attempts-row" id="attRow">
      <div class="atdot" id="at1"></div>
      <div class="atdot" id="at2"></div>
      <div class="atdot" id="at3"></div>
      <div class="atdot" id="at4"></div>
      <div class="atdot" id="at5"></div>
    </div>

    <div class="field">
      <label>Email Address</label>
      <div class="iw">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" oninput="clrErr()"/>
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      </div>
      <div class="ferr" id="e-em"></div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="iw">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" oninput="clrErr()" onkeydown="if(event.key==='Enter')doLogin()"/>
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <button type="button" class="eye" onclick="togEye()">
          <svg id="eyeIco" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="ferr" id="e-pw"></div>
    </div>

    <div class="forgot-row"><a class="forgot-link" href="forgot-password.html">Forgot password?</a></div>

    <button class="btn-p" id="loginBtn" onclick="doLogin()">
      <span class="bt">
        <svg style="display:inline;vertical-align:middle;margin-right:6px;" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </span>
      <span class="bl"><span class="lspin"></span></span>
    </button>

    <div class="link-row">New to LPSOS? <a href="register.html">Create an account →</a></div>
  </div>
</div>

<!-- ✅ FIX 1: config.js loaded FIRST — keys live there, not here -->
<script src="config.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
// ✅ FIX 1: Use variables from config.js — no hardcoded key
var _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ✅ FIX 3: Session check inside DOMContentLoaded — no flash of login before redirect
document.addEventListener('DOMContentLoaded', function(){
  _sb.auth.getSession().then(function(res){
    if (res.data && res.data.session){
      window.location.replace('proctor-home.html');
    }
  });
});

document.getElementById('nLI').onerror = function(){
  document.getElementById('nLW').innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0f9b6e" stroke-width="1.6"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>';
};

// ✅ FIX 2: Failed attempt tracking — 5 strikes then 30s lockout
var _failCount = 0;
var _maxFails  = 5;
var _lockoutMs = 30000; // 30 seconds
var _lockedUntil = 0;
var _countdownTimer = null;

function isLocked(){
  return Date.now() < _lockedUntil;
}

function startLockout(){
  _lockedUntil = Date.now() + _lockoutMs;
  var btn = document.getElementById('loginBtn');
  btn.disabled = true;
  document.getElementById('lockoutBar').classList.add('show');
  document.getElementById('gErr').classList.remove('show');

  _countdownTimer = setInterval(function(){
    var remaining = Math.ceil((_lockedUntil - Date.now()) / 1000);
    if (remaining <= 0){
      clearInterval(_countdownTimer);
      _failCount = 0;
      _lockedUntil = 0;
      btn.disabled = false;
      document.getElementById('lockoutBar').classList.remove('show');
      updateAttemptDots();
    } else {
      document.getElementById('countdown').textContent = remaining;
    }
  }, 500);
}

function updateAttemptDots(){
  var row = document.getElementById('attRow');
  if (_failCount > 0) row.classList.add('show'); else row.classList.remove('show');
  for (var i = 1; i <= 5; i++){
    var dot = document.getElementById('at' + i);
    if (dot) dot.className = 'atdot' + (i <= _failCount ? ' used' : '');
  }
}

var eyeOff = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
var eyeOn  = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
function togEye(){
  var i = document.getElementById('password');
  i.type = i.type === 'password' ? 'text' : 'password';
  document.getElementById('eyeIco').innerHTML = i.type === 'text' ? eyeOff : eyeOn;
}

function clrErr(){
  document.getElementById('gErr').classList.remove('show');
  ['email','password'].forEach(function(id){
    var i = document.getElementById(id);
    if (i) i.classList.remove('inv');
  });
  ['e-em','e-pw'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) el.textContent = '';
  });
}

function showErr(msg){
  document.getElementById('gErrTxt').textContent = msg;
  document.getElementById('gErr').classList.add('show');
  document.getElementById('email').classList.add('inv');
  document.getElementById('password').classList.add('inv');
}

async function doLogin(){
  // ✅ FIX 2: Block if locked out
  if (isLocked()) return;

  clrErr();

  var em = document.getElementById('email').value.trim();
  var pw = document.getElementById('password').value;
  var ok = true;

  if (!em || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){
    document.getElementById('e-em').textContent = 'Enter a valid email.';
    document.getElementById('email').classList.add('inv');
    ok = false;
  }
  // ✅ FIX 3: Changed from pw.length < 6 to just checking not empty
  // (server validates the password — client just ensures field isn't blank)
  if (!pw){
    document.getElementById('e-pw').textContent = 'Please enter your password.';
    document.getElementById('password').classList.add('inv');
    ok = false;
  }
  if (!ok) return;

  var btn = document.getElementById('loginBtn');
  btn.classList.add('ld');
  btn.disabled = true;

  try {
    var res = await _sb.auth.signInWithPassword({ email: em, password: pw });

    if (res.error) {
      btn.classList.remove('ld');
      btn.disabled = false;

      var msg = 'Invalid email or password.';
      if (res.error.message.toLowerCase().includes('email not confirmed')){
        msg = 'Please verify your email before signing in.';
      } else if (res.error.message.toLowerCase().includes('too many')){
        msg = 'Too many attempts. Please wait and try again.';
      } else {
        // ✅ FIX 2: Count failed credential attempts and lock after 5
        _failCount++;
        updateAttemptDots();
        if (_failCount >= _maxFails){
          startLockout();
          return;
        }
        var remaining = _maxFails - _failCount;
        msg = 'Invalid email or password. ' + remaining + ' attempt' + (remaining === 1 ? '' : 's') + ' remaining.';
      }

      showErr(msg);
      return;
    }

    // Log login activity — fire and forget
    try {
      var ipRes    = await fetch('https://api.ipify.org?format=json');
      var ipData   = await ipRes.json();
      var userInfo = res.data.user;
      // Fetch actual phone from users table
      var uRow = await _sb.from('users').select('phone').eq('id', userInfo.id).single();
      var userPhone = (uRow.data && uRow.data.phone) ? uRow.data.phone : '—';
      await _sb.from('user_login_activity').insert([{
        user_id:    userInfo.id,
        phone:      userPhone,
        ip_address: ipData.ip || 'unknown'
      }]);
    } catch(e){}

    // Check if user is blocked before allowing access
    try {
      var blockCheck = await _sb.from('users')
        .select('is_blocked, block_reason')
        .eq('id', res.data.user.id)
        .single();

      if (blockCheck.data && blockCheck.data.is_blocked) {
        // Sign them out immediately — blocked users cannot access the portal
        await _sb.auth.signOut();
        btn.classList.remove('ld');
        btn.disabled = false;
        showErr('Your account has been suspended. Please contact the administrator.');
        return;
      }
    } catch(e){}

    // Not blocked — navigate to proctor home
    window.location.replace('proctor-home.html');

  } catch(ex) {
    btn.classList.remove('ld');
    btn.disabled = false;
    showErr('Something went wrong. Please try again.');
  }
}
</script>
</body>
</html>

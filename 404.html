<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page Not Found — LPSOS</title>
<link rel="icon" href="https://raw.githubusercontent.com/190031124ravi/images/main/lpsos.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2faf6;--ink:#0f2219;--ink2:#2d5043;
  --muted:#7a9e8e;--faint:#c0d8ce;--border:#d5ebe0;
  --primary:#0f9b6e;--primary2:#0a7a56;--primary3:#e4f5ed;
  --pg:rgba(15,155,110,.12);--teal:#0d8fa0;--nav-h:68px;
}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}

/* BG */
.bg-fixed{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;background:linear-gradient(150deg,#f2faf6 0%,#e8f5ee 40%,#edfaf4 70%,#e4f7ed 100%);}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.38;animation:blobF 10s ease-in-out infinite;}
.b1{width:560px;height:560px;background:radial-gradient(#a7f3d0,#6ee7b7);top:-180px;right:-140px;}
.b2{width:420px;height:420px;background:radial-gradient(#99f6e4,#5eead4);bottom:-110px;left:-100px;animation-delay:-4s;}
.b3{width:280px;height:280px;background:radial-gradient(#d1fae5,#a7f3d0);top:50%;left:35%;animation-delay:-7s;}
@keyframes blobF{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(18px,-18px) scale(1.05);}66%{transform:translate(-14px,14px) scale(.96);}}
.bg-dots{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(15,155,110,.055) 1px,transparent 1px);background-size:32px 32px;}

/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:200;background:rgba(255,255,255,.93);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);box-shadow:0 2px 16px rgba(15,155,110,.07);}
.nav-inner{max-width:1100px;margin:0 auto;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 28px;}
.nav-brand{display:flex;align-items:center;gap:11px;text-decoration:none;flex-shrink:0;}
.nav-logo{width:42px;height:42px;border-radius:10px;border:2px solid var(--primary);overflow:hidden;background:var(--primary3);display:flex;align-items:center;justify-content:center;}
.nav-logo img{width:100%;height:100%;object-fit:contain;border-radius:8px;padding:2px;}
.nav-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);line-height:1.2;}
.nav-sub{font-size:10.5px;color:var(--muted);font-weight:500;letter-spacing:.07em;text-transform:uppercase;}
.nav-home-icon{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;background:var(--primary);color:#fff;border-radius:10px;border:none;text-decoration:none;transition:background .2s,transform .15s,box-shadow .2s;box-shadow:0 4px 14px rgba(15,155,110,.25);flex-shrink:0;}
.nav-home-icon svg{width:18px;height:18px;}
.nav-home-icon:hover{background:var(--primary2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(15,155,110,.35);}

/* PAGE */
.page{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(var(--nav-h) + 40px) 24px 72px;text-align:center;}

/* 404 NUMBER */
.four-o-four{
  font-family:'Playfair Display',serif;
  font-size:clamp(100px,20vw,180px);
  font-weight:700;
  line-height:1;
  margin-bottom:8px;
  background:linear-gradient(135deg,var(--primary),var(--teal));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:numIn .8s cubic-bezier(.22,1,.36,1) both;
  letter-spacing:-4px;
}
@keyframes numIn{from{opacity:0;transform:scale(.7) translateY(-20px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* CARD */
.card{background:rgba(255,255,255,.97);border-radius:24px;padding:40px 44px 36px;box-shadow:0 8px 44px rgba(15,155,110,.12),0 2px 8px rgba(0,0,0,.04),0 0 0 1px rgba(15,155,110,.06);position:relative;overflow:hidden;max-width:480px;width:100%;animation:cardIn .7s .15s cubic-bezier(.22,1,.36,1) both;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--teal));}
@keyframes cardIn{from{opacity:0;transform:translateY(32px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ICON */
.err-icon{
  width:72px;height:72px;
  border-radius:20px;
  background:var(--primary3);
  border:1px solid rgba(15,155,110,.18);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  animation:popIn .6s .25s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
.err-icon svg{width:32px;height:32px;color:var(--primary);}

.card h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(22px,4vw,28px);
  font-weight:700;
  color:var(--ink);
  margin-bottom:10px;
  line-height:1.2;
}
.card h1 em{font-style:italic;color:var(--primary);}
.card p{font-size:14.5px;color:var(--muted);line-height:1.75;margin-bottom:28px;max-width:360px;margin-left:auto;margin-right:auto;}

/* BUTTONS */
.btn-group{display:flex;flex-direction:column;gap:10px;}
.btn-p{width:100%;padding:13px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:none;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:transform .18s,box-shadow .2s;box-shadow:0 4px 20px rgba(15,155,110,.28);display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(15,155,110,.36);}
.btn-s{width:100%;padding:12px;background:transparent;border:1.5px solid var(--border);border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;color:var(--ink2);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;}
.btn-s:hover{border-color:var(--primary);background:var(--primary3);color:var(--primary2);}
.btn-s svg,.btn-p svg{width:15px;height:15px;flex-shrink:0;}

/* DIVIDER */
.or-row{display:flex;align-items:center;gap:12px;margin:4px 0;}
.or-row span{font-size:12px;color:var(--faint);font-weight:500;white-space:nowrap;}
.or-line{flex:1;height:1px;background:var(--border);}

/* QUICK LINKS */
.quick-links{margin-top:28px;animation:fadeU .6s .35s cubic-bezier(.22,1,.36,1) both;}
@keyframes fadeU{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.quick-links p{font-size:12.5px;color:var(--muted);margin-bottom:12px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;}
.quick-links-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.ql{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--primary2);background:rgba(255,255,255,.88);border:1px solid var(--border);border-radius:99px;padding:7px 16px;text-decoration:none;transition:all .2s;}
.ql:hover{background:var(--primary3);border-color:rgba(15,155,110,.3);transform:translateY(-1px);box-shadow:0 4px 12px rgba(15,155,110,.12);}
.ql svg{width:13px;height:13px;color:var(--primary);}

@media(max-width:600px){
  .nav-inner{padding:0 16px;}
  .nav-sub{display:none;}
  .page{padding:calc(var(--nav-h) + 28px) 16px 60px;}
  .card{padding:28px 20px 24px;border-radius:18px;}
  .four-o-four{font-size:clamp(80px,22vw,140px);}
}
</style>
</head>
<body>

<!-- NAVBAR -->

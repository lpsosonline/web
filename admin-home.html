<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Home — LPSOS</title>
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://qwcngezsbtlorkvgyeqz.supabase.co; img-src 'self' https://raw.githubusercontent.com https://github.com data:;"/>
<link rel="icon" href="https://raw.githubusercontent.com/190031124ravi/images/main/lpsos.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2faf6;--ink:#0f2219;--ink2:#2d5043;
  --muted:#7a9e8e;--faint:#c0d8ce;--border:#d5ebe0;
  --primary:#0f9b6e;--primary2:#0a7a56;--primary3:#e4f5ed;
  --pg:rgba(15,155,110,.12);--teal:#0d8fa0;
  --nav-h:68px;--info-h:32px;
}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);background:var(--bg);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;}

/* BG */
.bg-fixed{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;background:linear-gradient(150deg,#f2faf6 0%,#e8f5ee 40%,#edfaf4 70%,#e4f7ed 100%);}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.38;animation:blobF 10s ease-in-out infinite;}
.b1{width:560px;height:560px;background:radial-gradient(#a7f3d0,#6ee7b7);top:-180px;right:-140px;}
.b2{width:420px;height:420px;background:radial-gradient(#99f6e4,#5eead4);bottom:-110px;left:-100px;animation-delay:-4s;}
.b3{width:280px;height:280px;background:radial-gradient(#d1fae5,#a7f3d0);top:50%;left:35%;animation-delay:-7s;}
@keyframes blobF{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(18px,-18px) scale(1.05);}66%{transform:translate(-14px,14px) scale(.96);}}
.bg-dots{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(15,155,110,.055) 1px,transparent 1px);background-size:32px 32px;}

/* ── NAVBAR (top row) ── */
.navbar{
  position:fixed;top:0;left:0;right:0;
  height:var(--nav-h);
  z-index:200;
  background:rgba(255,255,255,.93);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:none;
  box-shadow:none;
}
.nav-inner{
  max-width:1200px;margin:0 auto;height:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;
}
.nav-brand{display:flex;align-items:center;gap:11px;text-decoration:none;flex-shrink:0;}
.nav-logo{width:42px;height:42px;border-radius:10px;border:2px solid var(--primary);overflow:hidden;background:var(--primary3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-logo img{width:100%;height:100%;object-fit:contain;border-radius:8px;padding:2px;}
.nav-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);line-height:1.2;}
.nav-sub{font-size:10.5px;color:var(--muted);font-weight:500;letter-spacing:.07em;text-transform:uppercase;}

/* Power icon logout button */
.btn-power{
  width:38px;height:38px;
  border-radius:10px;
  background:var(--primary3);
  border:1.5px solid var(--primary);
  color:var(--primary);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:background .2s,color .2s,transform .15s,box-shadow .2s;
  flex-shrink:0;
  position:relative;
}
.btn-power i{font-size:16px;transition:color .2s;}
.btn-power:hover{background:var(--primary);color:#fff;transform:translateY(-1px);box-shadow:0 4px 14px rgba(15,155,110,.3);}
.btn-power:hover i{color:#fff;}
/* Spinner overlay when logging out */
.btn-power .pw-spin{
  display:none;
  width:16px;height:16px;
  border:2px solid rgba(15,155,110,.3);
  border-top-color:var(--primary);
  border-radius:50%;
  animation:rot .7s linear infinite;
}
.btn-power.loading i{display:none;}
.btn-power.loading .pw-spin{display:block;}
.btn-power.loading{background:var(--primary3);pointer-events:none;}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── INFO BAR (below navbar) ── */
.info-bar{
  position:fixed;
  top:var(--nav-h);left:0;right:0;
  height:var(--info-h);
  z-index:199;
  background:rgba(15,155,110,.08);
  border-bottom:1px solid rgba(15,155,110,.15);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
}
.info-bar-inner{
  max-width:1200px;width:100%;
  padding:0 28px;
  display:flex;align-items:center;justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}
.info-item{
  display:flex;align-items:center;gap:5px;
  font-size:11.5px;font-weight:500;
  color:var(--primary2);
  white-space:nowrap;
}
.info-item i{font-size:10px;color:var(--primary);}
.info-sep{width:1px;height:12px;background:rgba(15,155,110,.25);}

/* ── PAGE ── */
.page{
  position:relative;z-index:1;flex:1;
  padding-top:calc(var(--nav-h) + var(--info-h) + 36px);
  padding-bottom:60px;
  padding-left:24px;padding-right:24px;
}
.page-wrap{max-width:1100px;margin:0 auto;}

/* PAGE HEADER */
.pg-header{margin-bottom:28px;animation:phIn .6s cubic-bezier(.22,1,.36,1) both;}
@keyframes phIn{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
.pg-header h1{font-family:'Playfair Display',serif;font-size:clamp(24px,4vw,36px);font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:5px;}
.pg-header h1 em{font-style:italic;color:var(--primary);}
.pg-header p{font-size:13.5px;color:var(--muted);line-height:1.6;}

/* LOADING */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;}
.l-ring{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap p{font-size:14px;color:var(--muted);}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:18px;
  animation:gridIn .5s .1s cubic-bezier(.22,1,.36,1) both;
}
@keyframes gridIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* PAGE CARD */
.pg-card{
  background:rgba(255,255,255,.97);
  border:1px solid var(--border);
  border-radius:20px;
  padding:26px 18px 22px;
  display:flex;flex-direction:column;align-items:center;gap:11px;
  cursor:pointer;text-decoration:none;
  transition:transform .25s,box-shadow .25s,border-color .22s;
  position:relative;overflow:hidden;
  box-shadow:0 4px 20px rgba(15,155,110,.07);
}
.pg-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--primary),var(--teal));
  transform:scaleX(0);transition:transform .3s;transform-origin:left;
}
.pg-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(15,155,110,.15);border-color:var(--primary);}
.pg-card:hover::after{transform:scaleX(1);}
.pg-card:hover .card-icon{transform:scale(1.12) rotate(-4deg);}
.card-icon{
  width:64px;height:64px;border-radius:17px;
  background:linear-gradient(135deg,var(--primary3),#a7f3d0);
  display:flex;align-items:center;justify-content:center;
  transition:transform .25s;flex-shrink:0;
}
.card-icon i{font-size:26px;color:var(--primary);}
.card-name{font-family:'Playfair Display',serif;font-size:14.5px;font-weight:700;color:var(--ink);text-align:center;line-height:1.3;}
.card-arrow{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;transition:color .2s;}
.pg-card:hover .card-arrow{color:var(--primary);}

/* NO ACCESS */
.no-access{
  text-align:center;padding:60px 24px;
  background:rgba(255,255,255,.7);
  border:2px dashed var(--faint);border-radius:20px;
  grid-column:1/-1;
}
.no-access i{font-size:48px;color:var(--faint);margin-bottom:14px;display:block;}
.no-access h3{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--ink2);margin-bottom:7px;}
.no-access p{font-size:13.5px;color:var(--muted);line-height:1.65;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 20px;border-radius:12px;font-size:13.5px;font-weight:500;opacity:0;transition:all .38s cubic-bezier(.34,1.56,.64,1);z-index:9999;width:max-content;max-width:90vw;display:flex;align-items:center;gap:9px;box-shadow:0 8px 32px rgba(0,0,0,.14);}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.err{background:rgba(220,38,38,.96);color:#fff;}
.toast.scs{background:rgba(5,150,105,.96);color:#fff;}
.toast.inf{background:rgba(255,255,255,.97);border:1px solid var(--border);color:var(--ink);}

/* ── MOBILE ── */
@media(max-width:640px){
  .nav-inner{padding:0 16px;}
  .nav-sub{display:none;}
  .nav-name{font-size:13px;}
  .info-bar-inner{padding:0 14px;gap:10px;}
  .info-item{font-size:11px;}
  .info-sep{display:none;}
  .page{padding-left:14px;padding-right:14px;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
  .pg-card{padding:20px 12px 16px;}
  .card-icon{width:54px;height:54px;border-radius:14px;}
  .card-icon i{font-size:22px;}
  .card-name{font-size:13px;}
}
@media(max-width:380px){
  .grid{grid-template-columns:1fr 1fr;}
  .info-bar{height:auto;padding:5px 0;}
  .info-bar-inner{flex-direction:column;gap:3px;align-items:flex-start;padding:0 14px;}
}
</style>
</head>
<body>

<div class="bg-fixed">
  <div class="bg-blob b1"></div><div class="bg-blob b2"></div><div class="bg-blob b3"></div>
  <div class="bg-dots"></div>
</div>

<!-- ── TOP NAVBAR ── -->
<nav class="navbar" style="border-bottom:1px solid var(--border);box-shadow:0 1px 0 var(--border);">
  <div class="nav-inner">
    <a class="nav-brand" href="admin-home.html">
      <div class="nav-logo" id="nLW">
        <img src="https://github.com/190031124ravi/images/blob/main/lpsosimage12.jpg?raw=true" alt="LPS" id="nLI"/>
      </div>
      <div>
        <div class="nav-name">LPS Omniscient Solutions</div>
        <div class="nav-sub">Admin Panel</div>
      </div>
    </a>

    <!-- Power icon logout -->
    <button class="btn-power" id="powerBtn" onclick="doLogout()" title="Logout">
      <i class="fa-solid fa-power-off"></i>
      <span class="pw-spin"></span>
    </button>
  </div>
</nav>

<!-- ── INFO BAR (name · email · phone) ── -->
<div class="info-bar" id="infoBar" style="display:none;">
  <div class="info-bar-inner">
    <div class="info-item"><i class="fa-solid fa-user"></i><span id="infoName">—</span></div>
    <div class="info-sep"></div>
    <div class="info-item"><i class="fa-solid fa-envelope"></i><span id="infoEmail">—</span></div>
    <div class="info-sep"></div>
    <div class="info-item"><i class="fa-solid fa-phone"></i><span id="infoPhone">—</span></div>
  </div>
</div>

<!-- ── MAIN PAGE ── -->
<div class="page">
  <div class="page-wrap">

    <div class="loading-wrap" id="loadWrap">
      <div class="l-ring"></div>
      <p>Loading your dashboard…</p>
    </div>

    <div id="dashWrap" style="display:none;">
      <div class="pg-header">
        <h1>Welcome <em id="welcomeName">back</em>!</h1>
        <p>Select a section below to manage your portal.</p>
      </div>
      <div class="grid" id="pageGrid"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
var _sb      = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var _profile = null;
var _pages   = [];

document.getElementById('nLI').onerror = function(){
  document.getElementById('nLW').innerHTML = '<i class="fa-solid fa-tv" style="font-size:20px;color:#0f9b6e;"></i>';
};

var _tT;
function showToast(msg, type){
  var t = document.getElementById('toast');
  t.innerHTML = '<span>' + msg + '</span>';
  t.className = 'toast on ' + (type || 'inf');
  clearTimeout(_tT);
  _tT = setTimeout(function(){ t.classList.remove('on'); }, 4500);
}

// ── Session check ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function(){
  try {
    var sessionRes = await _sb.auth.getSession();
    if (!sessionRes.data || !sessionRes.data.session){
      window.location.replace('admin-login.html');
      return;
    }

    var profileRes = await _sb.rpc('get_admin_profile');
    if (!profileRes.data || !profileRes.data.is_admin){
      await _sb.auth.signOut();
      window.location.replace('admin-login.html');
      return;
    }

    _profile = profileRes.data;

    // Populate info bar
    document.getElementById('infoName').textContent  = _profile.name  || '—';
    document.getElementById('infoEmail').textContent = _profile.email || '—';
    document.getElementById('infoPhone').textContent = _profile.phone || '—';
    document.getElementById('infoBar').style.display = 'flex';

    // Welcome heading — first name only
    var firstName = (_profile.name || 'Admin').split(' ')[0];
    document.getElementById('welcomeName').textContent = firstName;

    // Fetch all admin pages
    var pagesRes = await _sb.from('admin_pages')
      .select('page_name, page_url, display_name, icon')
      .order('display_name');

    if (pagesRes.error) throw pagesRes.error;
    _pages = pagesRes.data || [];

    buildGrid();

    document.getElementById('loadWrap').style.display = 'none';
    document.getElementById('dashWrap').style.display = 'block';

  } catch(e){
    window.location.replace('admin-login.html');
  }
});

// ── Build grid ────────────────────────────────────────────────
function buildGrid(){
  var allowed = Array.isArray(_profile.pages_allowed) ? _profile.pages_allowed : [];
  var grid    = document.getElementById('pageGrid');
  grid.innerHTML = '';

  var visible = _pages.filter(function(p){
    return allowed.indexOf(p.page_name) !== -1;
  });

  if (visible.length === 0){
    grid.innerHTML =
      '<div class="no-access">' +
        '<i class="fa-solid fa-lock"></i>' +
        '<h3>No Pages Accessible</h3>' +
        '<p>Your account has not been assigned any pages yet.<br>Contact the super administrator to grant access.</p>' +
      '</div>';
    return;
  }

  visible.forEach(function(p, idx){
    var card       = document.createElement('a');
    card.href      = p.page_url;
    card.className = 'pg-card';
    card.style.animationDelay = (idx * 0.06) + 's';
    card.innerHTML =
      '<div class="card-icon"><i class="' + escHtml(p.icon) + '"></i></div>' +
      '<div class="card-name">' + escHtml(p.display_name) + '</div>' +
      '<div class="card-arrow"><i class="" style="font-size:10px;"></i> </div>';
    grid.appendChild(card);
  });
}

// ── Logout ────────────────────────────────────────────────────
async function doLogout(){
  var btn = document.getElementById('powerBtn');
  btn.classList.add('loading');
  try {
    await _sb.auth.signOut();
  } catch(e){}
  window.location.replace('admin-login.html');
}

// ── XSS safe ─────────────────────────────────────────────────
function escHtml(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
</script>
</body>
</html>

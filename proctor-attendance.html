<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Attendance — LPSOS</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://qwcngezsbtlorkvgyeqz.supabase.co; img-src 'self' https://raw.githubusercontent.com https://github.com data:;"/>
<link rel="icon" href="https://raw.githubusercontent.com/190031124ravi/images/main/lpsos.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f2faf6;--ink:#0f2219;--ink2:#2d5043;--muted:#7a9e8e;--faint:#c0d8ce;--border:#d5ebe0;--primary:#0f9b6e;--primary2:#0a7a56;--primary3:#e4f5ed;--pg:rgba(15,155,110,.12);--teal:#0d8fa0;--error:#dc2626;--nav-h:68px;--info-h:32px;}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);background:var(--bg);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;}
.bg-fixed{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;background:linear-gradient(150deg,#f2faf6 0%,#e8f5ee 40%,#edfaf4 70%,#e4f7ed 100%);}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.38;animation:blobF 10s ease-in-out infinite;}
.b1{width:560px;height:560px;background:radial-gradient(#a7f3d0,#6ee7b7);top:-180px;right:-140px;}
.b2{width:420px;height:420px;background:radial-gradient(#99f6e4,#5eead4);bottom:-110px;left:-100px;animation-delay:-4s;}
.b3{width:280px;height:280px;background:radial-gradient(#d1fae5,#a7f3d0);top:50%;left:35%;animation-delay:-7s;}
@keyframes blobF{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(18px,-18px) scale(1.05);}66%{transform:translate(-14px,14px) scale(.96);}}
.bg-dots{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(15,155,110,.055) 1px,transparent 1px);background-size:32px 32px;}
.navbar{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:200;background:rgba(255,255,255,.93);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-inner{max-width:1100px;margin:0 auto;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 28px;}
.nav-brand{display:flex;align-items:center;gap:11px;text-decoration:none;flex-shrink:0;}
.nav-logo{width:42px;height:42px;border-radius:10px;border:2px solid var(--primary);overflow:hidden;background:var(--primary3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-logo img{width:100%;height:100%;object-fit:contain;border-radius:8px;padding:2px;}
.nav-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);line-height:1.2;}
.nav-sub{font-size:10.5px;color:var(--muted);font-weight:500;letter-spacing:.07em;text-transform:uppercase;}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-icon{width:36px;height:36px;border-radius:9px;background:var(--primary3);border:1.5px solid var(--primary);color:var(--primary);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;transition:background .2s,color .2s,transform .15s;flex-shrink:0;}
.btn-icon i{font-size:15px;}
.btn-icon:hover{background:var(--primary);color:#fff;transform:translateY(-1px);}
.info-bar{position:fixed;top:var(--nav-h);left:0;right:0;height:var(--info-h);z-index:199;background:rgba(15,155,110,.08);border-bottom:1px solid rgba(15,155,110,.15);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;}
.info-bar-inner{max-width:1100px;width:100%;padding:0 28px;display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;}
.info-item{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;color:var(--primary2);white-space:nowrap;}
.info-item i{font-size:10px;color:var(--primary);}
.info-sep{width:1px;height:12px;background:rgba(15,155,110,.25);}
.page{position:relative;z-index:1;flex:1;padding-top:calc(var(--nav-h) + var(--info-h) + 36px);padding-bottom:60px;padding-left:24px;padding-right:24px;display:flex;align-items:flex-start;justify-content:center;}
.page-wrap{max-width:520px;width:100%;}
/* ATTENDANCE CARD */
.att-card{background:rgba(255,255,255,.97);border:1px solid var(--border);border-radius:22px;box-shadow:0 8px 40px rgba(15,155,110,.12);position:relative;overflow:hidden;animation:cardIn .55s cubic-bezier(.22,1,.36,1) both;}
.att-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--teal));}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.att-body{padding:32px 32px 28px;text-align:center;}
.att-icon{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--primary3),#a7f3d0);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.att-icon i{font-size:32px;color:var(--primary);}
.att-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.att-title em{font-style:italic;color:var(--primary);}
.att-date{font-size:14px;color:var(--muted);margin-bottom:24px;display:flex;align-items:center;justify-content:center;gap:6px;}
.att-date i{font-size:12px;color:var(--primary);}
/* STATE BOXES */
.state-box{border-radius:14px;padding:20px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;text-align:left;}
.state-disabled{background:rgba(217,119,6,.06);border:1px solid rgba(217,119,6,.2);}
.state-disabled i{font-size:24px;color:#d97706;flex-shrink:0;}
.state-disabled h3{font-size:14.5px;font-weight:700;color:#92400e;margin-bottom:2px;}
.state-disabled p{font-size:13px;color:#b45309;line-height:1.5;margin:0;}
.state-marked{background:var(--primary3);border:1px solid rgba(15,155,110,.2);}
.state-marked i{font-size:28px;color:var(--primary);flex-shrink:0;}
.state-marked h3{font-size:14.5px;font-weight:700;color:var(--primary2);margin-bottom:2px;}
.state-marked p{font-size:13px;color:var(--muted);line-height:1.5;margin:0;}
/* MARK BUTTON */
.btn-mark{width:100%;padding:15px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:none;border-radius:14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:transform .18s,box-shadow .2s;box-shadow:0 6px 24px rgba(15,155,110,.3);display:flex;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden;}
.btn-mark:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 32px rgba(15,155,110,.38);}
.btn-mark:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.bt{display:block;transition:opacity .2s;}
.bl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;background:inherit;}
.btn-mark.ld .bt{opacity:0;}
.btn-mark.ld .bl{opacity:1;}
.lspin{width:22px;height:22px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}
/* HISTORY BTN */
.btn-hist{width:100%;margin-top:12px;padding:11px;background:transparent;border:1.5px solid var(--primary);border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;color:var(--primary2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.btn-hist:hover{background:var(--primary3);}
/* LOADING */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px;gap:14px;}
.l-ring{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap p{font-size:13px;color:var(--muted);}
/* HISTORY MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(15,34,25,.55);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);}
.modal-ov.open{display:flex;}
.modal{background:#fff;border-radius:18px;max-width:480px;width:100%;box-shadow:0 20px 50px rgba(15,34,25,.2);animation:modalIn .3s cubic-bezier(.34,1.56,.64,1) both;overflow:hidden;max-height:90vh;display:flex;flex-direction:column;}
@keyframes modalIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-header h3{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--ink);}
.modal-close{width:26px;height:26px;border-radius:7px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:13px;}
.modal-close:hover{background:var(--error);color:#fff;border-color:var(--error);}
.modal-body{padding:16px 20px 20px;overflow-y:auto;flex:1;}
.hist-tbl{width:100%;border-collapse:collapse;font-size:13px;}
.hist-tbl th{background:var(--primary);color:#fff;padding:9px 11px;text-align:left;font-weight:600;border:1px solid var(--primary2);font-size:11.5px;}
.hist-tbl td{padding:9px 11px;border:1px solid var(--border);vertical-align:middle;}
.hist-tbl tr:hover td{background:rgba(15,155,110,.025);}
.present-badge{display:inline-flex;align-items:center;gap:4px;background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:11px 20px;border-radius:11px;font-size:13.5px;font-weight:500;opacity:0;transition:all .38s cubic-bezier(.34,1.56,.64,1);z-index:9999;width:max-content;max-width:90vw;display:flex;align-items:center;gap:9px;box-shadow:0 8px 32px rgba(0,0,0,.14);}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.scs{background:rgba(5,150,105,.96);color:#fff;}
.toast.err{background:rgba(220,38,38,.96);color:#fff;}
@media(max-width:600px){.nav-inner{padding:0 16px;}.nav-sub{display:none;}.info-bar-inner{padding:0 14px;gap:10px;}.info-item{font-size:11px;}.info-sep{display:none;}.page{padding-left:14px;padding-right:14px;}.att-body{padding:24px 18px 20px;}}
</style>
</head>
<body>
<div class="bg-fixed"><div class="bg-blob b1"></div><div class="bg-blob b2"></div><div class="bg-blob b3"></div><div class="bg-dots"></div></div>

<nav class="navbar">
  <div class="nav-inner">
    <a class="nav-brand" href="proctor-home.html">
      <div class="nav-logo" id="nLW"><img src="https://github.com/190031124ravi/images/blob/main/lpsosimage12.jpg?raw=true" alt="LPS" id="nLI"/></div>
      <div><div class="nav-name">LPS Omniscient Solutions</div><div class="nav-sub">Proctor Portal</div></div>
    </a>
    <div class="nav-right">
      <a class="btn-icon" href="proctor-home.html" title="Back"><i class="fa-solid fa-arrow-left"></i></a>
      <button class="btn-icon" onclick="doLogout()" title="Logout"><i class="fa-solid fa-power-off"></i></button>
    </div>
  </div>
</nav>

<div class="info-bar" id="infoBar" style="display:none;">
  <div class="info-bar-inner">
    <div class="info-item"><i class="fa-solid fa-user"></i><span id="iN">—</span></div>
    <div class="info-sep"></div>
    <div class="info-item"><i class="fa-solid fa-envelope"></i><span id="iE">—</span></div>
    <div class="info-sep"></div>
    <div class="info-item"><i class="fa-solid fa-phone"></i><span id="iP">—</span></div>
  </div>
</div>

<div class="page">
  <div class="page-wrap">
    <div class="att-card">
      <div class="att-body" id="attBody">
        <div class="loading-wrap"><div class="l-ring"></div><p>Loading attendance…</p></div>
      </div>
    </div>
  </div>
</div>

<!-- HISTORY MODAL -->
<div class="modal-ov" id="histModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Attendance History</h3>
      <button class="modal-close" onclick="closeHist()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <table class="hist-tbl">
        <thead><tr><th>#</th><th>Date</th><th>Day</th><th>Marked At (IST)</th><th>Status</th></tr></thead>
        <tbody id="histBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="config.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
var _sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var _profile=null,_marked=false,_enabled=true;

document.getElementById('nLI').onerror=function(){document.getElementById('nLW').innerHTML='<i class="fa-solid fa-tv" style="font-size:20px;color:#0f9b6e;"></i>';};

var _tT;
function showToast(msg,type){var t=document.getElementById('toast');t.innerHTML='<span>'+msg+'</span>';t.className='toast on '+(type||'inf');clearTimeout(_tT);_tT=setTimeout(function(){t.classList.remove('on');},4000);}

function toIST(utcStr){
  if(!utcStr)return'—';
  try{
    var d=new Date(utcStr),ist=new Date(d.getTime()+5.5*60*60*1000);
    var dd=String(ist.getUTCDate()).padStart(2,'0');
    var mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][ist.getUTCMonth()];
    var yy=ist.getUTCFullYear();
    var hh=ist.getUTCHours(),mm=String(ist.getUTCMinutes()).padStart(2,'0');
    var ap=hh>=12?'PM':'AM';hh=hh%12||12;
    return dd+' '+mon+' '+yy+', '+hh+':'+mm+' '+ap+' IST';
  }catch(e){return'—';}}

function todayISO(){
  var ist=new Date(new Date().getTime()+5.5*60*60*1000);
  return ist.getUTCFullYear()+'-'+String(ist.getUTCMonth()+1).padStart(2,'0')+'-'+String(ist.getUTCDate()).padStart(2,'0');
}

function todayDisplay(){
  var ist=new Date(new Date().getTime()+5.5*60*60*1000);
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var mons=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return days[ist.getUTCDay()]+', '+String(ist.getUTCDate()).padStart(2,'0')+' '+mons[ist.getUTCMonth()]+' '+ist.getUTCFullYear();
}

document.addEventListener('DOMContentLoaded',async function(){
  try{
    var s=await _sb.auth.getSession();
    if(!s.data||!s.data.session){window.location.replace('login.html');return;}
    var uid=s.data.session.user.id;
    var uRes=await _sb.from('users').select('id,name,email,phone').eq('id',uid).single();
    if(uRes.error||!uRes.data){window.location.replace('login.html');return;}
    _profile=uRes.data;
    document.getElementById('iN').textContent=_profile.name||'—';
    document.getElementById('iE').textContent=_profile.email||'—';
    document.getElementById('iP').textContent=_profile.phone||'—';
    document.getElementById('infoBar').style.display='flex';

    // Check attendance control
    var ctrl=await _sb.from('attendance_control').select('is_enabled').eq('id',1).single();
    _enabled=!ctrl.error&&ctrl.data?ctrl.data.is_enabled:true;

    // Check if already marked today
    var today=todayISO();
    var chk=await _sb.from('meeting_attendance').select('id').eq('user_id',uid).eq('meeting_date',today).maybeSingle();
    _marked=!!(chk.data&&chk.data.id);

    renderCard();
  }catch(e){window.location.replace('login.html');}
});

function renderCard(){
  var today=todayDisplay();
  var html=
    '<div class="att-icon"><i class="fa-solid fa-calendar-check"></i></div>'+
    '<div class="att-title">Mark My <em>Attendance</em></div>'+
    '<div class="att-date"><i class="fa-solid fa-calendar-day"></i> '+today+'</div>';

  if(!_enabled){
    html+='<div class="state-box state-disabled"><i class="fa-solid fa-clock"></i><div><h3>Attendance Not Open</h3><p>Attendance marking is not enabled right now. Please check back later.</p></div></div>';
  }else if(_marked){
    html+='<div class="state-box state-marked"><i class="fa-solid fa-circle-check"></i><div><h3>Attendance Marked!</h3><p>Your attendance for today has been successfully recorded.</p></div></div>';
  }else{
    html+=
      '<button class="btn-mark" id="markBtn" onclick="markAttendance()">'+
        '<span class="bt"><i class="fa-solid fa-check" style="font-size:15px;"></i> Mark My Attendance</span>'+
        '<span class="bl"><span class="lspin"></span></span>'+
      '</button>';
  }

  html+='<button class="btn-hist" onclick="openHist()"><i class="fa-solid fa-clock-rotate-left" style="font-size:13px;"></i> View History</button>';
  document.getElementById('attBody').innerHTML=html;
}

async function markAttendance(){
  var btn=document.getElementById('markBtn');
  if(!btn)return;
  btn.classList.add('ld');btn.disabled=true;

  try{
    var today=todayISO();
    var res=await _sb.from('meeting_attendance').insert([{
      user_id:     _profile.id,
      name:        _profile.name,
      email:       _profile.email,
      phone:       _profile.phone,
      meeting_date:today
    }]);
    if(res.error)throw res.error;
    _marked=true;
    renderCard();
    showToast('Attendance marked successfully!','scs');
  }catch(ex){
    btn.classList.remove('ld');btn.disabled=false;
    if(ex.code==='23505'){
      _marked=true;renderCard();
    }else{
      showToast(ex.message||'Failed to mark attendance.','err');
    }
  }
}

async function openHist(){
  var res=await _sb.from('meeting_attendance')
    .select('meeting_date,marked_at')
    .eq('user_id',_profile.id)
    .order('meeting_date',{ascending:false})
    .limit(50);

  var tbody=document.getElementById('histBody');
  tbody.innerHTML='';

  if(!res.data||res.data.length===0){
    tbody.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:16px;">No attendance records yet.</td></tr>';
  }else{
    var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    res.data.forEach(function(r,idx){
      var d=new Date(r.meeting_date+'T00:00:00Z');
      var dayName=days[d.getUTCDay()];
      var dateStr=String(d.getUTCDate()).padStart(2,'0')+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getUTCMonth()]+' '+d.getUTCFullYear();
      var tr=document.createElement('tr');
      tr.innerHTML=
        '<td style="text-align:center;color:var(--muted);">'+(idx+1)+'</td>'+
        '<td style="font-weight:600;">'+dateStr+'</td>'+
        '<td style="color:var(--muted);">'+dayName+'</td>'+
        '<td style="font-size:12px;">'+toIST(r.marked_at)+'</td>'+
        '<td><span class="present-badge"><i class="fa-solid fa-check" style="font-size:9px;"></i> Present</span></td>';
      tbody.appendChild(tr);
    });
  }
  document.getElementById('histModal').classList.add('open');
}

function closeHist(){document.getElementById('histModal').classList.remove('open');}
document.getElementById('histModal').addEventListener('click',function(e){if(e.target===this)closeHist();});

async function doLogout(){try{await _sb.auth.signOut();}catch(e){}window.location.replace('login.html');}
</script>
</body>
</html>
